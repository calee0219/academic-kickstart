<head>

  <style>
    :root {
      --bg: #0f172a;
      --bg-card: #1e293b;
      --bg-card-hover: #334155;
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #38bdf8;
      --accent-hover: #7dd3fc;
      --border: #334155;
      --tag-bg: #1e3a5f;
      --tag-text: #7dd3fc;
      --planning-badge: #f59e0b;
      --completed-badge: #22c55e;
      --radius: 12px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* Header */
    .header {
      text-align: center;
      padding: 3rem 1.5rem 2rem;
      background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #0f172a 100%);
      border-bottom: 1px solid var(--border);
    }
    .header h1 {
      font-size: 2.2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .header p {
      color: var(--text-muted);
      font-size: 1rem;
      max-width: 600px;
      margin: 0 auto;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 1rem;
      color: var(--accent);
      text-decoration: none;
      font-size: 0.9rem;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent-hover); }

    /* Stats bar */
    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1.5rem;
      flex-wrap: wrap;
    }
    .stat {
      text-align: center;
    }
    .stat-num {
      font-size: 1.8rem;
      font-weight: 700;
      color: var(--accent);
    }
    .stat-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* Controls */
    .controls {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }
    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .control-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    select, .search-input {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    select:hover, .search-input:hover {
      border-color: var(--accent);
    }
    select:focus, .search-input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
    }
    .search-input {
      width: 200px;
    }
    .lang-toggle {
      margin-left: auto;
      display: flex;
      gap: 0;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
    }
    .lang-btn {
      background: var(--bg-card);
      color: var(--text-muted);
      border: none;
      padding: 0.5rem 1rem;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    .lang-btn.active {
      background: var(--accent);
      color: #0f172a;
      font-weight: 600;
    }
    .lang-btn:hover:not(.active) {
      background: var(--bg-card-hover);
      color: var(--text);
    }

    /* Filter tags */
    .filter-tags {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .filter-tag {
      background: var(--bg-card);
      color: var(--text-muted);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 0.35rem 0.85rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
    }
    .filter-tag:hover {
      border-color: var(--accent);
      color: var(--text);
    }
    .filter-tag.active {
      background: var(--tag-bg);
      color: var(--tag-text);
      border-color: var(--accent);
    }

    /* Trip grid */
    .trip-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 1.5rem 3rem;
    }
    .group-header {
      font-size: 1.2rem;
      font-weight: 600;
      color: var(--text);
      margin: 2rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .group-count {
      font-size: 0.8rem;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 0.15rem 0.5rem;
      border-radius: 10px;
    }
    .trip-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.25rem;
    }

    /* Trip card */
    .trip-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .trip-card:hover {
      transform: translateY(-4px);
      border-color: var(--accent);
      box-shadow: 0 8px 30px rgba(56, 189, 248, 0.15);
    }
    .card-banner {
      height: 160px;
      position: relative;
      overflow: hidden;
    }
    .card-banner-bg {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }
    .card-status {
      position: absolute;
      top: 0.75rem;
      right: 0.75rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .status-completed {
      background: rgba(34, 197, 94, 0.2);
      color: var(--completed-badge);
      border: 1px solid rgba(34, 197, 94, 0.3);
    }
    .status-planning {
      background: rgba(245, 158, 11, 0.2);
      color: var(--planning-badge);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .card-body {
      padding: 1.25rem;
    }
    .card-flag-title {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    .card-flag {
      font-size: 1.5rem;
    }
    .card-title {
      font-size: 1.15rem;
      font-weight: 600;
      line-height: 1.3;
    }
    .card-subtitle {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 0.75rem;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      margin-bottom: 0.75rem;
    }
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    .meta-icon {
      font-size: 0.9rem;
    }
    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .card-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 0.15rem 0.55rem;
      border-radius: 6px;
      font-size: 0.7rem;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
    .empty-state-icon {
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.8rem;
      border-top: 1px solid var(--border);
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }

    /* Responsive */
    @media (max-width: 768px) {
      .header h1 { font-size: 1.6rem; }
      .stats { gap: 1.5rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .lang-toggle { margin-left: 0; justify-content: center; }
      .search-input { width: 100%; }
      .trip-grid { grid-template-columns: 1fr; }
      .card-banner { height: 130px; }
    }
  </style>
</head>

      render();
    }

    function t(key) {
      return i18n[currentLang][key] || key;
    }

    function updateUI() {
      document.getElementById('pageTitle').textContent = t('pageTitle');
      document.getElementById('pageDesc').textContent = t('pageDesc');
      document.getElementById('backLink').textContent = t('backLink');
      document.getElementById('sortLabel').textContent = t('sortLabel');
      document.getElementById('groupLabel').textContent = t('groupLabel');
      document.getElementById('searchInput').placeholder = t('searchPlaceholder');
      document.getElementById('statTripsLabel').textContent = t('statTripsLabel');
      document.getElementById('statCountriesLabel').textContent = t('statCountriesLabel');
      document.getElementById('statDaysLabel').textContent = t('statDaysLabel');
      document.getElementById('statCitiesLabel').textContent = t('statCitiesLabel');
      document.getElementById('footerText').textContent = t('footerText');

      const sortSelect = document.getElementById('sortSelect');
      sortSelect.options[0].text = t('sortDateDesc');
      sortSelect.options[1].text = t('sortDateAsc');
      sortSelect.options[2].text = t('sortDurDesc');
      sortSelect.options[3].text = t('sortDurAsc');
      sortSelect.options[4].text = t('sortName');

      const groupSelect = document.getElementById('groupSelect');
      groupSelect.options[0].text = t('groupNone');
      groupSelect.options[1].text = t('groupYear');
      groupSelect.options[2].text = t('groupSeason');
      groupSelect.options[3].text = t('groupType');
      groupSelect.options[4].text = t('groupStatus');

      renderFilterTags();
    }

    // ===== FILTER TAGS =====
    function renderFilterTags() {
      const container = document.getElementById('filterTags');
      const filters = [
        { key: 'all', label: t('filterAll') },
        { key: 'city', label: t('filterCity') },
        { key: 'ski', label: t('filterSki') },
        { key: 'nature', label: t('filterNature') },
        { key: 'completed', label: t('filterCompleted') },
        { key: 'planning', label: t('filterPlanning') },
      ];
      container.innerHTML = filters.map(f =>
        `<span class="filter-tag ${activeFilter === f.key ? 'active' : ''}" onclick="setFilter('${f.key}')">${f.label}</span>`
      ).join('');
    }

    function setFilter(filter) {
      activeFilter = filter;
      renderFilterTags();
      render();
    }

    // ===== SORTING =====
    function sortTrips(list) {
      const sortVal = document.getElementById('sortSelect').value;
      return [...list].sort((a, b) => {
        switch (sortVal) {
          case 'date-desc': return new Date(b.date) - new Date(a.date);
          case 'date-asc': return new Date(a.date) - new Date(b.date);
          case 'duration-desc': return b.duration - a.duration;
          case 'duration-asc': return a.duration - b.duration;
          case 'name-asc': return a[currentLang].title.localeCompare(b[currentLang].title);
          default: return 0;
        }
      });
    }

    // ===== FILTERING =====
    function filterTrips(list) {
      const search = document.getElementById('searchInput').value.toLowerCase();
      return list.filter(trip => {
        // Type / status filter
        if (activeFilter !== 'all') {
          if (activeFilter === 'completed' && trip.status !== 'completed') return false;
          if (activeFilter === 'planning' && trip.status !== 'planning') return false;
          if (activeFilter === 'city' && trip.type !== 'city') return false;
          if (activeFilter === 'ski' && trip.type !== 'ski') return false;
          if (activeFilter === 'nature' && trip.type !== 'nature') return false;
        }
        // Search
        if (search) {
          const haystack = [
            trip.en.title, trip.zh.title,
            trip.en.subtitle, trip.zh.subtitle,
            ...trip.countries,
            ...trip.en.tags, ...trip.zh.tags
          ].join(' ').toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        return true;
      });
    }

    // ===== GROUPING =====
    function groupTrips(list) {
      const groupVal = document.getElementById('groupSelect').value;
      if (groupVal === 'none') return { '': list };

      const groups = {};
      list.forEach(trip => {
        let key;
        switch (groupVal) {
          case 'year':
            key = new Date(trip.date).getFullYear().toString();
            break;
          case 'season':
            const seasonMap = { spring: t('seasonSpring'), summer: t('seasonSummer'), autumn: t('seasonAutumn'), winter: t('seasonWinter') };
            key = seasonMap[trip.season] || trip.season;
            break;
          case 'type':
            const typeMap = { city: t('typeCity'), ski: t('typeSki'), nature: t('typeNature') };
            key = typeMap[trip.type] || trip.type;
            break;
          case 'status':
            key = trip.status === 'completed' ? t('statusCompleted') : t('statusPlanning');
            break;
          default:
            key = '';
        }
        if (!groups[key]) groups[key] = [];
        groups[key].push(trip);
      });

      // Sort group keys
      const sortedKeys = Object.keys(groups).sort((a, b) => {
        if (groupVal === 'year') return parseInt(b) - parseInt(a);
        return a.localeCompare(b);
      });
      const sorted = {};
      sortedKeys.forEach(k => sorted[k] = groups[k]);
      return sorted;
    }

    // ===== RENDER =====
    function renderCard(trip) {
      const data = trip[currentLang];
      const statusClass = trip.status === 'completed' ? 'status-completed' : 'status-planning';
      return `
        <a class="trip-card" href="${trip.url}" title="${data.title}">
          <div class="card-banner">
            <div class="card-banner-bg" style="background: ${trip.banner_gradient};">
              ${trip.banner_emoji}
            </div>
            <span class="card-status ${statusClass}">${data.status_str}</span>
          </div>
          <div class="card-body">
            <div class="card-flag-title">
              <span class="card-flag">${trip.flag}</span>
              <span class="card-title">${data.title}</span>
            </div>
            <div class="card-subtitle">${data.subtitle}</div>
            <div class="card-meta">
              <span class="meta-item"><span class="meta-icon">📅</span> ${data.date_str}</span>
              <span class="meta-item"><span class="meta-icon">⏱️</span> ${trip.duration} ${t('days')}</span>
              <span class="meta-item"><span class="meta-icon">📍</span> ${trip.countries.join(', ')}</span>
            </div>
            <div class="card-tags">
              ${data.tags.map(tag => `<span class="card-tag">${tag}</span>`).join('')}
            </div>
          </div>
        </a>
      `;
    }

    function render() {
      const container = document.getElementById('tripContainer');
      let filtered = filterTrips(trips);
      let sorted = sortTrips(filtered);
      let groups = groupTrips(sorted);

      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">🔍</div>
            <h3>${t('emptyTitle')}</h3>
            <p>${t('emptyDesc')}</p>
          </div>
        `;
        return;
      }

      let html = '';
      for (const [groupName, groupTrips] of Object.entries(groups)) {
        if (groupName) {
          html += `<div class="group-header">${groupName} <span class="group-count">${groupTrips.length}</span></div>`;
        }
        html += `<div class="trip-grid">${groupTrips.map(renderCard).join('')}</div>`;
      }
      container.innerHTML = html;
    }

    // ===== EVENT LISTENERS =====
    document.getElementById('sortSelect').addEventListener('change', render);
    document.getElementById('groupSelect').addEventListener('change', render);
    document.getElementById('searchInput').addEventListener('input', render);

    // ===== INIT =====
    updateUI();
    render();
  </script>
</body>
</html>
