<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a365d"/>
      <stop offset="100%" stop-color="#4299e1"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="12" fill="url(#sky)"/>
  <!-- Snow mountain -->
  <polygon points="10,48 28,18 46,48" fill="#e2e8f0" stroke="#cbd5e0" stroke-width="0.5"/>
  <polygon points="28,18 22,28 28,25 34,28" fill="white"/>
  <polygon points="30,48 44,24 58,48" fill="#edf2f7" stroke="#cbd5e0" stroke-width="0.5"/>
  <polygon points="44,24 39,32 44,30 49,32" fill="white"/>
  <!-- Ski tracks -->
  <line x1="20" y1="36" x2="36" y2="46" stroke="#fc8181" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <line x1="22" y1="34" x2="38" y2="44" stroke="#fc8181" stroke-width="1.5" stroke-linecap="round" opacity="0.8"/>
  <!-- Snowflakes -->
  <circle cx="12" cy="10" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="50" cy="8" r="1" fill="white" opacity="0.5"/>
  <circle cx="30" cy="6" r="1.2" fill="white" opacity="0.6"/>
  <circle cx="8" cy="22" r="0.8" fill="white" opacity="0.4"/>
  <circle cx="55" cy="16" r="1.3" fill="white" opacity="0.5"/>
  <!-- Snow ground -->
  <rect x="0" y="46" width="64" height="18" rx="0" fill="white" opacity="0.9"/>
  <ellipse cx="32" cy="46" rx="36" ry="4" fill="white"/>
  <!-- JP text -->
  <text x="32" y="58" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="bold" fill="#1a365d">JP SKI</text>
</svg>
