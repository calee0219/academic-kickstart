<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#4a90d9"/>
    </linearGradient>
    <linearGradient id="snow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e8f0"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="url(#sky)"/>
  <!-- Mountain back -->
  <polygon points="8,48 24,18 40,48" fill="#5a7fa0" opacity="0.7"/>
  <!-- Mountain front -->
  <polygon points="20,48 38,14 56,48" fill="url(#snow)"/>
  <!-- Snow cap -->
  <polygon points="38,14 32,24 35,22 38,26 41,22 44,24" fill="#ffffff"/>
  <!-- Skier -->
  <circle cx="28" cy="33" r="2.5" fill="#ff6b35"/>
  <line x1="28" y1="35.5" x2="28" y2="42" stroke="#ff6b35" stroke-width="2" stroke-linecap="round"/>
  <line x1="28" y1="42" x2="25" y2="46" stroke="#ff6b35" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="28" y1="42" x2="31" y2="46" stroke="#ff6b35" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="28" y1="37" x2="24" y2="40" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="28" y1="37" x2="32" y2="34" stroke="#ff6b35" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Ski poles -->
  <line x1="24" y1="40" x2="22" y2="46" stroke="#c0c0c0" stroke-width="1" stroke-linecap="round"/>
  <line x1="32" y1="34" x2="34" y2="40" stroke="#c0c0c0" stroke-width="1" stroke-linecap="round"/>
  <!-- Snowflake decorations -->
  <text x="48" y="22" font-size="8" fill="#ffffff" opacity="0.8">❄</text>
  <text x="12" y="30" font-size="6" fill="#ffffff" opacity="0.6">❄</text>
  <text x="50" y="38" font-size="5" fill="#ffffff" opacity="0.5">❄</text>
</svg>
