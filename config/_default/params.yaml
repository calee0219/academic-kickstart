# yaml-language-server: $schema=https://hugoblox.com/schema/v2/params.schema.json

hugoblox:
  schema: "2.0"

  # ──────────────────────────────────────────────────────────────────────────
  # IDENTITY
  # ──────────────────────────────────────────────────────────────────────────
  identity:
    name: "Chia-An Lee"
    type: person
    tagline: "CS student in NYCU, Taiwan"
    description: "Interested in networking, study on 5G, cooperate with free5GC."
    organization: "National Yang Ming Chiao Tung University"
    social:
      twitter: ""

  # ──────────────────────────────────────────────────────────────────────────
  # THEME
  # ──────────────────────────────────────────────────────────────────────────
  theme:
    mode: system
    colors:
      primary: "#1565c0"
    surfaces:
      appearance: light

  # ──────────────────────────────────────────────────────────────────────────
  # TYPOGRAPHY
  # ──────────────────────────────────────────────────────────────────────────
  typography:
    font: academic
    size: md

  # ──────────────────────────────────────────────────────────────────────────
  # HEADER
  # ──────────────────────────────────────────────────────────────────────────
  header:
    enable: true
    style: navbar
    sticky: true
    search: true
    theme_toggle: true
    theme_picker: false
    language_switcher: false
    align: r

  # ──────────────────────────────────────────────────────────────────────────
  # FOOTER
  # ──────────────────────────────────────────────────────────────────────────
  footer:
    style: minimal
    language_switcher: false
    text: ""

  # ──────────────────────────────────────────────────────────────────────────
  # COPYRIGHT
  # ──────────────────────────────────────────────────────────────────────────
  copyright:
    notice: "Chia-An Lee"

  # ──────────────────────────────────────────────────────────────────────────
  # SEO
  # ──────────────────────────────────────────────────────────────────────────
  seo:
    title: "Chia-An Lee"

  # ──────────────────────────────────────────────────────────────────────────
  # CONTENT
  # ──────────────────────────────────────────────────────────────────────────
  content:
    math:
      enable: false
    citations:
      style: apa

  # ──────────────────────────────────────────────────────────────────────────
  # COMMENTS
  # ──────────────────────────────────────────────────────────────────────────
  comments:
    enable: true
    provider: disqus
    disqus:
      shortname: "calee-persinal"

  # ──────────────────────────────────────────────────────────────────────────
  # ANALYTICS
  # ──────────────────────────────────────────────────────────────────────────
  analytics:
    google:
      measurement_id: "UA-100433652-2"

  # ──────────────────────────────────────────────────────────────────────────
  # SEARCH
  # ──────────────────────────────────────────────────────────────────────────
  search:
    enable: true

  # ──────────────────────────────────────────────────────────────────────────
  # LAYOUT
  # ──────────────────────────────────────────────────────────────────────────
  layout:
    avatar_shape: circle

  # ──────────────────────────────────────────────────────────────────────────
  # LOCALE
  # ──────────────────────────────────────────────────────────────────────────
  locale:
    date_format: "Jan 2, 2006"
    time_format: "3:04 PM"
    address_format: zh-country

  # ──────────────────────────────────────────────────────────────────────────
  # PRIVACY
  # ──────────────────────────────────────────────────────────────────────────
  privacy:
    enable: false

  # ──────────────────────────────────────────────────────────────────────────
  # PREMIUM
  # ──────────────────────────────────────────────────────────────────────────
  pro:
    hide_attribution: false
    affiliate_code: ""
